name: Update Price History

on:
  schedule:
    # Hafta içi 08:30 TR (UTC+3 = UTC 05:30) — piyasa açılmadan önce
    - cron: "30 5 * * 1-5"
  workflow_dispatch:   # Manuel tetikleme

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance

      - name: Update price history
        run: python -m scripts.update_prices

      - name: Commit updated report.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/report.json
          git diff --staged --quiet || git commit -m "chore: price history guncellendi $(date -u +%Y-%m-%d)"
          git push
