name: Daily Analysis & Notify

on:
  schedule:
    # NOT: GitHub ücretsiz cron'u 15dk–birkaç saat gecikebilir/atlayabilir.
    # Bu yüzden gün içinde birden çok saat tanımlandı — biri atlarsa diğeri yakalar.
    - cron: "0 6 * * *"    # 09:00 TR — açılış
    - cron: "0 10 * * *"   # 13:00 TR — öğle yedek
    - cron: "0 13 * * *"   # 16:00 TR — kapanış sonrası
    - cron: "0 16 * * *"   # 19:00 TR — akşam yedek
  workflow_dispatch:        # Manuel tetikleme
  push:
    branches: [main]
    paths-ignore:
      - 'data/report.json'  # raporun kendisi commit edilince tetikleme (sonsuz döngü)
      - 'data/track.json'
      - '**.md'
      - 'docs/**'

concurrency:
  # Tüm rapor yazan workflow'lar aynı grupta — aynı anda push edip çakışmasınlar
  group: report-commit
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          TR_INTEREST_RATE: ${{ secrets.TR_INTEREST_RATE }}
        run: python -m scripts.analyze

      - name: Send notifications
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import json, os
          if not (os.environ.get('TELEGRAM_BOT_TOKEN') or os.environ.get('GMAIL_ADDRESS')):
              print('Notification secrets not set, skipping.')
          else:
              from scripts.notify import notify_morning, notify_changes
              with open('data/report.json') as f:
                  report = json.load(f)
              notify_morning(report)
              notify_changes(report)
          "

      - name: Commit report.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/report.json data/track.json
          if git diff --staged --quiet; then
            echo "ℹ️  report.json değişmedi (fiyatlar aynı kalmış)"
            exit 0
          fi
          MSG="chore: daily report $(date -u +%Y-%m-%dT%H:%MZ)"
          git commit -m "$MSG"
          # Dayanıklı push: çakışma üretmeden remote'un üstüne taze raporu koy
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then echo "✅ push başarılı (deneme $i)"; exit 0; fi
            echo "⚠️  push reddedildi, remote ile senkron (deneme $i)…"
            git fetch origin main
            git reset --soft origin/main   # üretilen dosya tree'de kalır, HEAD remote ucuna gelir
            git add data/report.json data/track.json
            if git diff --staged --quiet; then echo "ℹ️  remote zaten güncel"; exit 0; fi
            git commit -m "$MSG"
            sleep $((RANDOM % 6 + 3))
          done
          echo "::error::push 5 denemede başarısız oldu"
          exit 1
