name: Update Price History

on:
  schedule:
    # Hafta içi 08:30 TR (UTC+3 = UTC 05:30) — piyasa açılmadan önce
    - cron: "30 5 * * 1-5"
  workflow_dispatch:   # Manuel tetikleme

permissions:
  contents: write

concurrency:
  group: report-commit
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance

      - name: Update price history
        run: python -m scripts.update_prices

      - name: Commit updated report.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/report.json data/track.json
          if git diff --staged --quiet; then
            echo "ℹ️  değişiklik yok"
            exit 0
          fi
          MSG="chore: price history guncellendi $(date -u +%Y-%m-%d)"
          git commit -m "$MSG"
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then echo "✅ push başarılı (deneme $i)"; exit 0; fi
            echo "⚠️  push reddedildi, remote ile senkron (deneme $i)…"
            git fetch origin main
            git reset --soft origin/main
            git add data/report.json data/track.json
            if git diff --staged --quiet; then echo "ℹ️  remote zaten güncel"; exit 0; fi
            git commit -m "$MSG"
            sleep $((RANDOM % 6 + 3))
          done
          echo "::error::push 5 denemede başarısız oldu"
          exit 1
